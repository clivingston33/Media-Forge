name: release-desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RAW_CSC_LINK: ${{ secrets.CSC_LINK }}
      RAW_CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      MEDIAFORGE_PUBLISH: always
      MEDIAFORGE_ENABLE_AUTO_UPDATES: '1'
      MEDIAFORGE_UPDATE_PROVIDER: github
      MEDIAFORGE_UPDATE_REPOSITORY: ${{ github.repository }}
      MEDIAFORGE_GITHUB_RELEASE_TYPE: draft
      MEDIAFORGE_RELEASE_CHANNEL: stable
      MEDIAFORGE_SENTRY_DSN: ${{ secrets.MEDIAFORGE_SENTRY_DSN }}
      MEDIAFORGE_BACKEND_SENTRY_DSN: ${{ secrets.MEDIAFORGE_BACKEND_SENTRY_DSN }}
      MEDIAFORGE_SENTRY_ENVIRONMENT: production
      MEDIAFORGE_SENTRY_TRACES_SAMPLE_RATE: '0.1'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Export Python 3.12 path
        shell: pwsh
        run: |
          $pythonPath = python -c "import sys; print(sys.executable)"
          "MEDIAFORGE_PYTHON312=$pythonPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Export optional signing secrets
        shell: pwsh
        run: |
          if ($env:RAW_CSC_LINK) {
            "CSC_LINK=$env:RAW_CSC_LINK" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }
          if ($env:RAW_CSC_KEY_PASSWORD) {
            "CSC_KEY_PASSWORD=$env:RAW_CSC_KEY_PASSWORD" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Provision backend runtimes and bundled tools
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File backend/setup_real_tools.ps1

      - name: Run backend regression tests
        shell: pwsh
        working-directory: backend
        run: .\.venv\Scripts\python -m unittest discover -s tests -v

      - name: Build and publish Windows release
        working-directory: frontend
        run: npm run dist:release

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mediaforge-windows-release
          path: frontend/release/*
